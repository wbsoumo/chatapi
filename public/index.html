<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Backend API Service Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b141a;
            --card-bg: #111b21;
            --accent-color: #00a884;
            --accent-hover: #008f72;
            --text-color: #e9edef;
            --text-muted: #8696a0;
            --border-color: #222e35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: rgba(0, 168, 132, 0.1);
            color: var(--accent-color);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 800;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 168, 132, 0.15);
            color: #00ffca;
            border: 1px solid rgba(0, 168, 132, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ffca;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffca;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        p.desc {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            width: 100%;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .link-btn.primary {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 168, 132, 0.25);
        }

        .link-btn.primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .link-btn.secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .link-btn.secondary:hover {
            background-color: rgba(255, 255, 255, 0.03);
            border-color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-circle">💬</div>
    <h1>WhatsApp Backend Service</h1>
    
    <div>
        <div class="status-badge">
            <span class="status-dot"></span>
            Hosting Online
        </div>
    </div>

    <p class="desc">
        Your production-grade backend API is online and resolving requests correctly. Configure your Android client to target this URL.
    </p>

    <div class="nav-links">
        <a href="install.php" class="link-btn primary">Open Database Installer</a>
        <a href="https://github.com/wbsoumo/chatapi" target="_blank" class="link-btn secondary">View Code Repository</a>
    </div>
</div>

</body>
</html>
